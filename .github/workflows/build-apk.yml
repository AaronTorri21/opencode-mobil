name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - name: Build APK
        run: |
          cd /tmp
          flutter create --project-name opencode_mobile --org com.opencode --platforms android mi_app
          cd mi_app
          rm -rf lib test
          cp -r $GITHUB_WORKSPACE/lib .
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          cp $GITHUB_WORKSPACE/android/app/src/main/AndroidManifest.xml android/app/src/main/
          flutter pub get
          flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: opencode-mobile-apk
          path: /tmp/mi_app/build/app/outputs/flutter-apk/app-release.apk
          
